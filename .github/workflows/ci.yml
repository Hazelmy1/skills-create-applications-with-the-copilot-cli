name: CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and Test (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: samples/book-app-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 . --max-line-length=100 --extend-ignore=E203

      - name: Run tests
        run: pytest test_books.py -v
